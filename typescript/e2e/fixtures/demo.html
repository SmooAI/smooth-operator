<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>@smooai/chat-widget — live e2e demo</title>
        <style>
            body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #0b1020;
                color: #e2e8f0;
                min-height: 100vh;
            }
        </style>
    </head>
    <body>
        <h1>chat-widget live e2e</h1>

        <!-- Loads the IIFE bundle produced by `pnpm build`. The element below
             auto-registers. `endpoint` points at the locally-spawned
             smooth-operator-server (see e2e/widget.live.spec.ts), and
             `agent-id` is a fixed UUID because the protocol/pydantic side keys
             the conversation session on a UUID agentId. `start-open` so the
             panel is visible immediately without a launcher click. -->
        <script src="/dist/widget/chat-widget.iife.js"></script>
        <smooth-agent-chat
            endpoint="ws://127.0.0.1:8830/ws"
            agent-id="11111111-1111-4111-8111-111111111111"
            agent-name="Support"
            start-open
        ></smooth-agent-chat>
    </body>
</html>
