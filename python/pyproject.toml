[project]
name = "smooai-smooth-operator"
version = "1.4.0"
description = "Python protocol types and native async WebSocket client for the smooth-operator protocol. Generated from the language-neutral JSON Schemas in spec/."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    # `pydantic[email]` because several wire fields use JSON Schema `format: email`,
    # which datamodel-code-generator maps to pydantic `EmailStr` (needs email-validator).
    "pydantic[email]>=2",
    "jsonschema>=4.21",
]

[project.optional-dependencies]
# The default WebSocketTransport uses the `websockets` library. It is optional:
# the client is fully usable (and testable) with any injected Transport.
websockets = ["websockets>=12"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "datamodel-code-generator>=0.25",
    "ruff>=0.4",
    # The live E2E (tests/test_e2e_live.py) drives the real WebSocketTransport,
    # which needs the `websockets` library. Kept as an optional project extra for
    # consumers; pinned into the dev group so `uv run pytest` can run the E2E.
    "websockets>=12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/smooth_operator"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# The generated module is machine output; don't fight it.
extend-select = ["I"]

[tool.ruff.lint.per-file-ignores]
"src/smooth_operator/_generated.py" = ["E501", "F401", "N", "UP"]
