<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Smooth</title>
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                background: #0b1020;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            }
        </style>
    </head>
    <body>
        <!-- The local-flavor server injects the auth token below (same-origin,
             loopback). The widget connects to this server's own /ws, carrying the
             token in the ?token= slot the operator's verifier reads. -->
        <script>
            // Replaced server-side with a JSON-encoded string (safe quoting).
            window.__SMOOTH_TOKEN__ = __SMOOTH_LOCAL_TOKEN__;
        </script>
        <script src="/chat-widget.iife.js"></script>
        <script>
            (function () {
                var proto = location.protocol === 'https:' ? 'wss' : 'ws';
                var tok = window.__SMOOTH_TOKEN__;
                var endpoint = proto + '://' + location.host + '/ws' + (tok ? '?token=' + encodeURIComponent(tok) : '');
                var el = document.createElement('smooth-agent-chat');
                el.setAttribute('endpoint', endpoint);
                // The protocol keys the conversation session on a UUID agentId.
                el.setAttribute('agent-id', '11111111-1111-4111-8111-111111111111');
                el.setAttribute('agent-name', 'Smooth');
                el.setAttribute('mode', 'fullpage');
                el.setAttribute('start-open', '');
                document.body.appendChild(el);
            })();
        </script>
    </body>
</html>
