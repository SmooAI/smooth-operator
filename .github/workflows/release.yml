# Changesets-driven release for ALL published smooth-operator artifacts, in lockstep.
#
# Flow (the @smooai/config model):
#   1. PRs land with a `.changeset/*.md` describing the bump.
#   2. This workflow opens/updates a "🦋 New version release" PR that runs
#      `version:bump` = `changeset version` (bumps @smooai/smooth-operator) +
#      `version:sync` (stamps the SAME version onto the .NET csproj — see
#      scripts/sync-versions.mjs).
#   3. Merging that PR re-runs this workflow, which publishes npm (changeset
#      publish) and then NuGet — every artifact at the one shared version.
#
# The standalone publish-npm.yml / publish-nuget.yml remain as manual fallbacks.
# Secrets: GH_PAT, SMOOAI_NPM_TOKEN, SMOOAI_NUGET_API_KEY, SMOOAI_CARGO_REGISTRY_TOKEN,
# SMOOAI_PYPI_TOKEN (all org-wide; PyPI also supports OIDC Trusted Publishing).
name: Release (Changesets 🦋)

on:
    workflow_dispatch:
    push:
        branches:
            - main

env:
    CI: true
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
            actions: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GH_PAT }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install uv
              run: curl -LsSf https://astral.sh/uv/install.sh | sh

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.26'

            - name: Install dependencies
              run: pnpm install

            - name: Build + test npm package
              run: |
                  pnpm --filter @smooai/smooth-operator build
                  pnpm --filter @smooai/smooth-operator test

            - name: .NET restore + build + test
              run: |
                  dotnet restore dotnet/SmooAI.SmoothOperator.slnx
                  dotnet build dotnet/SmooAI.SmoothOperator.slnx -c Release --no-restore
                  dotnet test dotnet/SmooAI.SmoothOperator.slnx -c Release --no-build --verbosity normal

            - name: Version + publish npm (Changesets 🦋)
              id: changesets
              uses: changesets/action@v1
              with:
                  commit: '🦋 New version release'
                  title: '🦋 New version release'
                  version: pnpm run version:bump
                  publish: pnpm ci:publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_PAT }}
                  NPM_TOKEN: ${{ secrets.SMOOAI_NPM_TOKEN }}

            - name: Publish SmooAI.SmoothOperator.Core to NuGet
              if: steps.changesets.outputs.published == 'true'
              env:
                  NUGET_API_KEY: ${{ secrets.SMOOAI_NUGET_API_KEY }}
              run: |
                  if [ -z "${NUGET_API_KEY}" ]; then
                      echo "::error::SMOOAI_NUGET_API_KEY secret is not set"
                      exit 1
                  fi
                  dotnet pack dotnet/core/src/SmooAI.SmoothOperator.Core.csproj -c Release --no-build -o dist
                  dotnet nuget push "dist/*.nupkg" \
                      --api-key "${NUGET_API_KEY}" \
                      --source https://api.nuget.org/v3/index.json \
                      --skip-duplicate

            # --- Rust → crates.io --------------------------------------------------
            # Publish in TOPOLOGICAL order (a crate must exist on the index before the
            # crates that depend on it can publish). The reference lib first, then
            # ingestion (depends on it), then the adapters (depend on lib/ingestion),
            # then the server (depends on all of them). `--no-verify` skips the
            # rebuild (the npm/.NET steps above already exercised the workspace); the
            # retry loop tolerates crates.io index-propagation lag and treats an
            # "already uploaded/exists" error as success (idempotent re-runs).
            - name: Publish Rust crates to crates.io
              if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.SMOOAI_CARGO_REGISTRY_TOKEN }}
              run: |
                  if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
                      echo "::error::SMOOAI_CARGO_REGISTRY_TOKEN secret is not set"
                      exit 1
                  fi
                  # The workspace core dep keeps a sibling-repo `path` for local
                  # two-repo dev; that path is absent on CI runners, which breaks
                  # `cargo publish`'s workspace load (it reads every member's path
                  # deps). Strip it so both the load and the published manifest
                  # resolve smooai-smooth-operator-core from crates.io — the
                  # `version` is the authoritative requirement. Publish-time only;
                  # not committed.
                  sed -i -E 's#smooai-smooth-operator-core = \{ path = "[^"]*", version = "0.14" \}#smooai-smooth-operator-core = "0.14"#' rust/Cargo.toml
                  publish_crate() {
                      local crate="$1"
                      local attempt=1
                      local max=6
                      while [ "${attempt}" -le "${max}" ]; do
                          echo "Publishing ${crate} (attempt ${attempt}/${max})..."
                          local out
                          if out=$(cargo publish -p "${crate}" --no-verify --manifest-path rust/Cargo.toml 2>&1); then
                              echo "${out}"
                              echo "Published ${crate}."
                              return 0
                          fi
                          echo "${out}"
                          if echo "${out}" | grep -qiE "already (exists|uploaded)|crate version .* is already"; then
                              echo "${crate} already published at this version — treating as success."
                              return 0
                          fi
                          echo "Publish of ${crate} failed; waiting for index propagation before retry..."
                          sleep 30
                          attempt=$((attempt + 1))
                      done
                      echo "::error::Failed to publish ${crate} after ${max} attempts"
                      return 1
                  }
                  for crate in \
                      smooai-smooth-operator \
                      smooai-smooth-operator-ingestion \
                      smooai-smooth-operator-adapter-memory \
                      smooai-smooth-operator-adapter-backplane-redis \
                      smooai-smooth-operator-adapter-backplane-nats \
                      smooai-smooth-operator-adapter-postgres \
                      smooai-smooth-operator-adapter-dynamodb \
                      smooai-smooth-operator-server; do
                      publish_crate "${crate}"
                  done

            # --- Python → PyPI -----------------------------------------------------
            # Prefer Trusted Publishing (OIDC) via the job's `id-token: write`; fall
            # back to a token if SMOOAI_PYPI_TOKEN is set. Build + publish the client,
            # then the engine core.
            - name: Publish Python packages to PyPI
              if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
              env:
                  UV_PUBLISH_TOKEN: ${{ secrets.SMOOAI_PYPI_TOKEN }}
              run: |
                  export PATH="$HOME/.local/bin:$PATH"
                  (cd python && uv build && uv publish)
                  (cd python/core && uv build && uv publish)

            # --- Go → git tag ------------------------------------------------------
            # The Go module is published by tagging. The subdir module lives at
            # ./go, so the tag MUST be the subdir form `go/v<VERSION>` (NOT `go-v...`)
            # for `go get github.com/SmooAI/smooth-operator/go@v<VERSION>` to resolve.
            - name: Tag Go module
              if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}
              run: |
                  VERSION=$(jq -r '.version' typescript/package.json)
                  TAG="go/v${VERSION}"
                  if git rev-parse "${TAG}" >/dev/null 2>&1; then
                      echo "Tag ${TAG} already exists — skipping."
                      exit 0
                  fi
                  git tag "${TAG}"
                  git push origin "${TAG}"

            - name: Auto-merge the Changeset PR
              run: |
                  PR_NUMBER=$(gh pr list --state open --head changeset-release/main --json number --jq '.[0].number')
                  if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
                      echo "Auto-merging Changeset PR #$PR_NUMBER"
                      gh pr merge "$PR_NUMBER" --auto --squash
                  else
                      echo "No open Changeset PR to merge."
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}
