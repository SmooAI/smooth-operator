# Changesets-driven release for ALL published smooth-operator artifacts, in lockstep.
#
# Flow (the @smooai/config model):
#   1. PRs land with a `.changeset/*.md` describing the bump.
#   2. This workflow opens/updates a "🦋 New version release" PR that runs
#      `version:bump` = `changeset version` (bumps @smooai/smooth-operator) +
#      `version:sync` (stamps the SAME version onto the .NET csproj / PyPI server /
#      crates / Go — see scripts/sync-versions.mjs).
#   3. Merging that PR re-runs this workflow, which runs `ci:publish`
#      (scripts/ci-publish.mjs) — the single idempotent orchestrator that publishes
#      EVERY registry at the one shared version: npm (changeset publish) → NuGet
#      (SmooAI.SmoothOperator.Server) → PyPI (client + server) → crates.io.
#
# Registry independence lives INSIDE ci-publish.mjs: each registry is
# existence-checked + skip-if-published, and one registry's failure does NOT skip
# the others (an unpublishable `create-smooth-extension` E403 once pinned crates.io
# at 1.11.4 while npm shipped 1.21.x — the orchestrator now attempts every registry
# regardless and exits non-zero only at the end). The changesets step stays
# `continue-on-error: true` so a hard ci:publish failure can't abort the Go-tag /
# auto-merge steps; the final "Fail if publish failed" step re-raises it.
#
# The standalone publish-npm.yml remains as a manual npm fallback; any registry can
# also be re-published by hand with `DRY_RUN=0 pnpm ci:publish` (or a workflow_dispatch).
# Secrets: GH_PAT, SMOOAI_NPM_TOKEN, SMOOAI_NUGET_API_KEY, SMOOAI_CARGO_REGISTRY_TOKEN,
# SMOOAI_PYPI_TOKEN (all org-wide; PyPI also supports OIDC Trusted Publishing).
name: Release (Changesets 🦋)

on:
    workflow_dispatch:
    push:
        branches:
            - main

env:
    CI: true
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
            actions: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GH_PAT }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install uv
              run: curl -LsSf https://astral.sh/uv/install.sh | sh

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.26'

            - name: Install dependencies
              run: pnpm install

            - name: Build + test npm package
              run: |
                  pnpm --filter @smooai/smooth-operator build
                  pnpm --filter @smooai/smooth-operator test

            - name: .NET restore + build + test
              run: |
                  dotnet restore dotnet/SmooAI.SmoothOperator.slnx
                  dotnet build dotnet/SmooAI.SmoothOperator.slnx -c Release --no-restore
                  dotnet test dotnet/SmooAI.SmoothOperator.slnx -c Release --no-build --verbosity normal

            # `ci:publish` (scripts/ci-publish.mjs) is the single orchestrator: it runs
            # sync-versions (lockstep guard) then publishes npm → NuGet → PyPI → crates.io,
            # each existence-checked + skip-if-published, one registry's failure NOT
            # skipping the others. It exits non-zero if ANY registry hard-fails.
            #
            # ALWAYS `continue-on-error: true`: a hard ci:publish failure (e.g. an
            # unpublishable `create-smooth-extension` npm E403) must not abort the job
            # before the Go-tag / auto-merge steps. It is NOT swallowed — the final
            # "Fail if publish failed" step re-raises it. The publish tokens live on
            # THIS step's env because ci-publish.mjs runs as the changesets `publish:`
            # command and inherits them.
            - name: Version + publish all registries (Changesets 🦋)
              id: changesets
              continue-on-error: true
              uses: changesets/action@v1
              with:
                  commit: '🦋 New version release'
                  title: '🦋 New version release'
                  version: pnpm run version:bump
                  publish: pnpm ci:publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_PAT }}
                  NPM_TOKEN: ${{ secrets.SMOOAI_NPM_TOKEN }}
                  SMOOAI_NUGET_API_KEY: ${{ secrets.SMOOAI_NUGET_API_KEY }}
                  SMOOAI_PYPI_TOKEN: ${{ secrets.SMOOAI_PYPI_TOKEN }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.SMOOAI_CARGO_REGISTRY_TOKEN }}

            # --- Go → git tag ------------------------------------------------------
            # The Go module is published by tagging. The subdir module lives at
            # ./go, so the tag MUST be the subdir form `go/v<VERSION>` (NOT `go-v...`)
            # for `go get github.com/SmooAI/smooth-operator/go@v<VERSION>` to resolve.
            #
            # The "already tagged" check MUST ask the REMOTE: actions/checkout does not
            # fetch tags, so `git rev-parse "${TAG}"` always misses locally and we'd
            # re-create a tag that already exists on origin — the push is then rejected
            # and the step fails. Like the crates.io/PyPI steps, re-running at an
            # already-published version has to be a no-op, not an error.
            - name: Tag Go module
              if: steps.changesets.outputs.published == 'true' || steps.changesets.outcome == 'failure' || github.event_name == 'workflow_dispatch'
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}
              run: |
                  VERSION=$(jq -r '.version' typescript/package.json)
                  TAG="go/v${VERSION}"
                  if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
                      echo "Tag ${TAG} already exists on origin — skipping."
                      exit 0
                  fi
                  git tag "${TAG}"
                  git push origin "${TAG}"

            - name: Auto-merge the Changeset PR
              run: |
                  PR_NUMBER=$(gh pr list --state open --head changeset-release/main --json number --jq '.[0].number')
                  if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
                      echo "Auto-merging Changeset PR #$PR_NUMBER"
                      gh pr merge "$PR_NUMBER" --auto --squash
                  else
                      echo "No open Changeset PR to merge."
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}

            # Runs LAST, after the Go tag + auto-merge: re-raise a tolerated ci:publish
            # failure so the run is red and the breakage stays visible. ci-publish.mjs
            # already attempted every registry (it fails only at the end), so this just
            # surfaces the non-zero exit past the step's continue-on-error.
            - name: Fail if publish failed
              if: steps.changesets.outcome == 'failure'
              run: |
                  echo "::error::ci:publish failed — see 'Version + publish all registries (Changesets 🦋)' for which registry(ies). The orchestrator attempts every registry before exiting non-zero."
                  exit 1
