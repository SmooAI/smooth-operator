# JavaScript/TypeScript packages in this repo.
#
# `typescript` is the single published npm SDK — it exposes the protocol client
# (`.`), the React bindings (`./react`), and the web-component chat widget
# (`./widget`) as subpath exports of one package, so consumers install one thing
# and import what they need.
#
# `console` (the admin app) is private (never published) and is a member too, so
# one `pnpm install` at the repo root links everything.
packages:
    - typescript
    - console
