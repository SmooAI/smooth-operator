# JavaScript/TypeScript packages in this repo.
#
# `typescript` is the single published npm SDK — it exposes the protocol client
# (`.`), the React bindings (`./react`), and the web-component chat widget
# (`./widget`) as subpath exports of one package, so consumers install one thing
# and import what they need.
#
# `console` (the admin app) is private (never published) and is a member too, so
# one `pnpm install` at the repo root links everything.
#
# `typescript/server` is the native TypeScript server — a WebSocket service that
# speaks the protocol and runs `@smooai/smooth-operator-core` per turn (the TS
# sibling of `rust/smooth-operator-server` and `dotnet/server`). Private (not
# published); the client in `typescript/` is the published SDK.
#
# `typescript/extension-sdk` is the published SEP (Smooth Extension Protocol) SDK
# — `defineExtension`/`defineTool`, a stdio JSON-RPC transport, an in-process test
# host, and a conformance runner for building extensions in TypeScript.
packages:
    - typescript
    - typescript/server
    - typescript/extension-sdk
    - console
